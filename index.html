// ── CART CONTEXT ───────────────────────────────────────────
const CartContext = React.createContext();
function CartProvider({children}) {
  const [cartItems, setCartItems] = React.useState([]);
  const [order, setOrder] = React.useState(null);
  const addToCart = (product, qty=1, color='', size='') => {
    setCartItems(prev => {
      const key = `${product.id}-${color}-${size}`;
      const ex = prev.find(i => i.key===key);
      if(ex) return prev.map(i => i.key===key ? {...i,qty:i.qty+qty} : i);
      return [...prev, {...product,qty,color,size,key,checked:true}];
    });
  };
  const updateQty = (key,delta) => setCartItems(prev=>prev.map(i=>i.key===key?{...i,qty:Math.max(1,i.qty+delta)}:i));
  const removeItem = (key) => setCartItems(prev=>prev.filter(i=>i.key!==key));
  const toggleCheck = (key) => setCartItems(prev=>prev.map(i=>i.key===key?{...i,checked:!i.checked}:i));
  const cartCount = cartItems.reduce((s,i)=>s+i.qty,0);
  const checkedItems = cartItems.filter(i=>i.checked);
  const subtotal = checkedItems.reduce((s,i)=>s+i.price*i.qty,0);
  const totalSaved = checkedItems.reduce((s,i)=>s+(i.original-i.price)*i.qty,0);
  return (
    <CartContext.Provider value={{cartItems,addToCart,updateQty,removeItem,toggleCheck,cartCount,subtotal,totalSaved,order,setOrder}}>
      {children}
    </CartContext.Provider>
  );
}
const useCart = () => React.useContext(CartContext);

// ── FLASH TIMER ────────────────────────────────────────────
function FlashDealTimer() {
  const [secs,setSecs] = React.useState(7243);
  React.useEffect(()=>{
    const t=setInterval(()=>setSecs(s=>Math.max(0,s-1)),1000);
    return ()=>clearInterval(t);
  },[]);
  const h=String(Math.floor(secs/3600)).padStart(2,'0');
  const m=String(Math.floor((secs%3600)/60)).padStart(2,'0');
  const s=String(secs%60).padStart(2,'0');
  const Block=({v})=>(
    <span style={{background:'#1a1a2e',color:'#fff',borderRadius:6,padding:'3px 7px',fontWeight:800,fontSize:14,fontFamily:'monospace'}}>{v}</span>
  );
  return (
    <div style={{display:'flex',alignItems:'center',gap:4}}>
      <Block v={h}/><span style={{color:'#fff',fontWeight:800}}>:</span>
      <Block v={m}/><span style={{color:'#fff',fontWeight:800}}>:</span>
      <Block v={s}/>
    </div>
  );
}

// ── CART ───────────────────────────────────────────────────

            <button onClick={()=>setScreen('address')} disabled={checkedItems.length===0} style={{width:'100%',padding:'15px',borderRadius:12,border:'none',background:checkedItems.length===0?'#e5e7eb':'linear-gradient(90deg,#1a56db,#0ea5e9)',color:checkedItems.length===0?'#9ca3af':'#fff',fontSize:16,fontWeight:800,cursor:checkedItems.length===0?'not-allowed':'pointer',boxShadow:checkedItems.length>0?'0 4px 14px rgba(26,86,219,0.35)':'none'}}>

// ── PAYMENT ────────────────────────────────────────────────
function Payment({setScreen}) {
  const {subtotal,setOrder,cartItems}=useCart();

  const [voucher,setVoucher]=React.useState('');
  const [voucherApplied,setVoucherApplied]=React.useState(false);
  const [useCredits,setUseCredits]=React.useState(false);
  const skyroCredits=250;
  const discount=voucherApplied?100:0;
  const creditsUsed=useCredits?Math.min(skyroCredits,subtotal):0;
  const total=Math.max(0,subtotal-discount-creditsUsed);
  const payMethods=[{id:'card',label:'Credit / Debit Card',icon:'💳'},{id:'gcash',label:'GCash',icon:'📱'},{id:'paypal',label:'PayPal',icon:'🅿️'},{id:'cod',label:'Cash on Delivery',icon:'💵'}];
  const handlePlace=()=>{
    setOrder({id:'SKY-'+Math.random().toString(36).substr(2,8).toUpperCase(),date:'April 5, 2026',items:cartItems.filter(i=>i.checked),total,method,status:'placed'});
    setScreen('tracking');
  };
  return (
    <div style={{paddingBottom:90}}>
      <div style={{background:'linear-gradient(135deg,#1a56db,#0ea5e9)',padding:'16px 16px 18px',display:'flex',alignItems:'center',gap:12}}>
        <button onClick={()=>setScreen('address')} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:10,width:36,height:36,cursor:'pointer',fontSize:18,color:'#fff'}}>←</button>
        <span style={{fontWeight:800,fontSize:17,color:'#fff'}}>Payment</span>
      </div>
      <div style={{padding:'16px 16px 0'}}>
        <div style={{fontWeight:700,fontSize:14,color:'#374151',marginBottom:12}}>Payment Method</div>
        {payMethods.map(pm=>(
          <div key={pm.id} onClick={()=>setMethod(pm.id)} style={{background:'#fff',borderRadius:12,padding:'13px 14px',marginBottom:8,border:`2px solid ${method===pm.id?'#1a56db':'#e5e7eb'}`,cursor:'pointer',display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:20,height:20,borderRadius:99,border:`2px solid ${method===pm.id?'#1a56db':'#d1d5db'}`,background:method===pm.id?'#1a56db':'#fff',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
              {method===pm.id&&<div style={{width:8,height:8,borderRadius:99,background:'#fff'}}/>}
            </div>
            <span style={{fontSize:20}}>{pm.icon}</span>
            <span style={{fontSize:14,fontWeight:600,color:'#111'}}>{pm.label}</span>
          </div>
        ))}
        <div style={{fontWeight:700,fontSize:14,color:'#374151',margin:'16px 0 10px'}}>Promo Code / Voucher</div>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <input value={voucher} onChange={e=>setVoucher(e.target.value)} placeholder="Enter voucher code" style={{flex:1,padding:'11px 14px',borderRadius:10,border:'1.5px solid #e5e7eb',fontSize:14,outline:'none',fontFamily:'Inter,sans-serif'}}/>
          <button onClick={()=>voucher&&setVoucherApplied(true)} style={{padding:'11px 16px',borderRadius:10,border:'none',background:'#1a56db',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>Apply</button>
        </div>
        {voucherApplied&&<div style={{background:'#f0fdf4',borderRadius:10,padding:'8px 12px',marginBottom:12,fontSize:13,fontWeight:600,color:'#16a34a'}}>✅ Voucher applied! You saved ₱100</div>}

    </div>

          <div style={{fontSize:12,color:'#bfdbfe',marginBottom:4}}>Order Number</div>
          <div style={{fontSize:18,fontWeight:900,color:'#fff',letterSpacing:1}}>{orderId}</div>
          <div style={{fontSize:12,color:'#bfdbfe',marginTop:4}}>Placed on {orderDate}</div>
        </div>
      </div>
      <div style={{margin:'16px 16px 0',background:'#eff6ff',borderRadius:14,padding:'14px 16px',textAlign:'center',border:'2px solid #bfdbfe'}}>
        <div style={{fontSize:12,color:'#6b7280',marginBottom:4}}>Estimated Delivery</div>
        <div style={{fontSize:22,fontWeight:900,color:'#1a56db'}}>April 8–10, 2026</div>
        <div style={{fontSize:12,color:'#6b7280',marginTop:2}}>📍 Quezon City, NCR</div>
      </div>
      <div style={{margin:'12px 16px 0',background:'#fff',borderRadius:12,padding:'12px 14px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontSize:12,color:'#6b7280'}}>Carrier</div><div style={{fontSize:14,fontWeight:700,color:'#111'}}>Skyro Express</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:12,color:'#6b7280'}}>Tracking No.</div><div style={{fontSize:13,fontWeight:700,color:'#1a56db'}}>SKYEXP-{orderId.replace('SKY-','')}</div></div>
      </div>
      <div style={{margin:'16px 16px 0',background:'#fff',borderRadius:14,padding:'16px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
        <div style={{fontWeight:700,fontSize:14,color:'#111',marginBottom:16}}>Shipment Status</div>
        {steps.map((step,i)=>{
          const isDone=i<=ACTIVE; const isActive=i===ACTIVE;
          return (
            <div key={i} style={{display:'flex',gap:14,position:'relative'}}>
              {i<steps.length-1&&<div style={{position:'absolute',left:17,top:36,width:2,height:40,background:i<ACTIVE?'#1a56db':'#e5e7eb',zIndex:0}}/>}
              <div style={{width:36,height:36,borderRadius:99,flexShrink:0,zIndex:1,background:isActive?'#1a56db':isDone?'#dbeafe':'#f3f4f6',border:`2px solid ${isDone?'#1a56db':'#e5e7eb'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,boxShadow:isActive?'0 0 0 4px rgba(26,86,219,0.15)':'none'}}>{step.icon}</div>
              <div style={{paddingBottom:24}}>
                <div style={{fontSize:13,fontWeight:isActive?800:600,color:isDone?'#111':'#9ca3af'}}>{step.label}</div>
                <div style={{fontSize:11,color:isActive?'#1a56db':'#9ca3af',fontWeight:isActive?600:400}}>{step.desc}</div>
              </div>
            </div>
          );
        })}
      </div>
      {items.length>0&&(
        <div style={{margin:'12px 16px 0',background:'#fff',borderRadius:14,padding:'14px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
          <div style={{fontWeight:700,fontSize:14,color:'#111',marginBottom:10}}>Items in this Order</div>
          {items.map(item=>(
            <div key={item.key} style={{display:'flex',gap:10,alignItems:'center',marginBottom:10}}>
              <img src={item.image} alt={item.name} style={{width:52,height:52,borderRadius:10,objectFit:'cover'}}/>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:'#111'}}>{item.name}</div><div style={{fontSize:11,color:'#9ca3af'}}>Qty: {item.qty}{item.color?` · ${item.color}`:''}</div></div>
              <div style={{fontSize:14,fontWeight:800,color:'#1a56db'}}>₱{(item.price*item.qty).toLocaleString()}</div>
            </div>
          ))}
        </div>
      )}
      <div style={{margin:'12px 16px 0',display:'flex',gap:10}}>
        <button style={{flex:1,padding:'13px',borderRadius:12,border:'2px solid #1a56db',background:'#fff',color:'#1a56db',fontSize:13,fontWeight:700,cursor:'pointer'}}>💬 Contact Seller</button>
        <button style={{flex:1,padding:'13px',borderRadius:12,border:'2px solid #e5e7eb',background:'#fff',color:'#374151',fontSize:13,fontWeight:700,cursor:'pointer'}}>↩️ Request Return</button>
      </div>
      <div style={{margin:'16px 16px 0',textAlign:'center',paddingBottom:24}}>
        <button onClick={()=>setScreen('home')} style={{padding:'13px 32px',borderRadius:12,border:'none',background:'linear-gradient(90deg,#1a56db,#0ea5e9)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 14px rgba(26,86,219,0.3)'}}>Continue Shopping ✈️</button>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────
const SCREENS_WITH_NAV=['home','categories','cart','messages','profile'];
function App() {
  const [screen,setScreen]=React.useState('signin');
  const [selectedProduct,setSelectedProduct]=React.useState(null);
  const renderScreen=()=>{
    switch(screen){
      case 'signin': return <SignIn setScreen={setScreen}/>;
      case 'home': return <Home setScreen={setScreen} setSelectedProduct={setSelectedProduct}/>;
      case 'product': return selectedProduct?<ProductDetail product={selectedProduct} setScreen={setScreen}/>:null;
      case 'cart': return <Cart setScreen={setScreen}/>;
      case 'address': return <Address setScreen={setScreen}/>;
      case 'payment': return <Payment setScreen={setScreen}/>;
      case 'tracking': return <OrderTracking setScreen={setScreen}/>;
      case 'categories':
      case 'messages':
      case 'profile':
        return (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'80vh',gap:12}}>
            <div style={{fontSize:60}}>{screen==='categories'?'☰':screen==='messages'?'💬':'👤'}</div>
            <div style={{fontSize:18,fontWeight:700,color:'#111',textTransform:'capitalize'}}>{screen}</div>
            <div style={{fontSize:14,color:'#9ca3af'}}>Coming soon on Skyro ✈️</div>
          </div>
        );
      default: return null;
    }
  };
  return (
    <CartProvider>
      <div style={{minHeight:'100vh',background:'#f8fafc'}}>
        {renderScreen()}
        {SCREENS_WITH_NAV.includes(screen)&&<BottomNav screen={screen} setScreen={setScreen}/>}
      </div>
    </CartProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
